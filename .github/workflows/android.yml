name: Build Android APK

on:
  push:
    branches: [ main ] # ඔයාගේ branch එකේ නම (main හෝ master)
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4 # v3 වෙනුවට v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4 # v3 වෙනුවට v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: gradle

    - name: Grant execute permission for gradlew
      run: chmod +x gradlew

    - name: Build with Gradle
      run: ./gradlew assembleDebug

    - name: Upload APK
      uses: actions/upload-artifact@v4 # මෙන්න මේකයි ප්‍රධානම වෙනස
      with:
        name: samp-mobile-launcher
        path: app/build/outputs/apk/debug/*.apk
