name: Build Android APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: gradle

    # මෙතනදී අපි NDK version 25.1.8937393 වගේ stable එකක් install කරනවා
    - name: Install Android NDK
      run: |
        echo "y" | sudo ${ANDROID_HOME}/cmdline-tools/latest/bin/sdkmanager --install "ndk;25.1.8937393"

    - name: Grant execute permission for gradlew
      run: chmod +x gradlew

    - name: Build with Gradle
      run: ./gradlew assembleDebug -Pandroid.ndkVersion=25.1.8937393

    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: samp-mobile-launcher
        path: app/build/outputs/apk/debug/*.apk
